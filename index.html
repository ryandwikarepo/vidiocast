<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Loop & Mute Player - Global Sync</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .input-section {
            margin-bottom: 20px;
            z-index: 20;
            position: relative;
        }
        :fullscreen .input-section {
            display: none !important;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            background-color: #222;
            color: #fff;
            border: 1px solid #414141;
        }
        input[type="text"]:focus {
            outline: 1px solid #ff0000;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-wrapper:fullscreen {
            padding-bottom: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 0, 0, 0.8);
            border-color: #ff0000;
        }
        .video-wrapper:hover .fullscreen-btn {
            opacity: 1;
        }
        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div class="input-section">
        <input type="text" id="youtubeUrl" placeholder="Masukkan Link YouTube atau Video ID...">
        <button onclick="loadNewVideo()">Putar</button>
    </div>

    <div id="playerWrapper" class="video-wrapper hidden">
        <div id="player"></div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Layar Penuh">
            <svg viewBox="0 0 24 24">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // === KONFIGURASI SUPABASE (Nama variabel diubah agar tidak bentrok) ===
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    // Menggunakan nama 'supabaseClient' untuk menghindari SyntaxError
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player;
    let currentVideoId = 'bRNlrdfKNd4'; 

    window.onload = async function() {
        try {
            const { data, error } = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 1)
                .maybeSingle();

            if (data && data.video_id && data.video_id !== 'contoh') {
                currentVideoId = data.video_id;
                document.getElementById('youtubeUrl').value = `https://www.youtube.com/watch?v=${currentVideoId}`;
            }
        } catch (err) {
            console.log("Membaca konfigurasi fallback lokal:", err);
        } finally {
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }
    };

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\?v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    function onYouTubeIframeAPIReady() {
        if (!currentVideoId) return;
        document.getElementById('playerWrapper').classList.remove('hidden');

        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({
                videoId: currentVideoId,
                startSeconds: 0
            });
            setTimeout(() => {
                player.mute();
                player.playVideo();
            }, 500);
        } else {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': currentVideoId,
                    'mute': 1,          
                    'controls': 1,      
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
    }

    function onPlayerReady(event) {
        event.target.mute();
        event.target.playVideo();
        
        setTimeout(() => {
            if (event.target.getPlayerState() !== 1) {
                event.target.playVideo();
            }
        }, 1000);
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            player.playVideo();
        }
    }

    async function loadNewVideo() {
        const inputData = document.getElementById('youtubeUrl').value.trim();
        if (!inputData) return alert('Masukkan link YouTube terlebih dahulu!');

        const videoId = extractVideoId(inputData);
        
        if (videoId.length === 11) {
            currentVideoId = videoId;
            
            onYouTubeIframeAPIReady();

            // Menggunakan database `.upsert()` melalui client baru
            const { error } = await supabaseClient
                .from('video_settings')
                .upsert({ id: 1, video_id: videoId }); 

            if (error) {
                alert("Gagal sinkronisasi ke cloud Supabase: " + error.message);
            }
        } else {
            alert('Format link atau Video ID tidak valid!');
        }
    }

    function toggleFullscreen() {
        const elem = document.getElementById('playerWrapper');
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }
</script>

</body>
</html>
