<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Player Loop & Mute - Global Sync</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .input-section {
            margin-bottom: 20px;
            z-index: 20;
            position: relative;
        }
        :fullscreen .input-section {
            display: none !important;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            background-color: #222;
            color: #fff;
            border: 1px solid #414141;
        }
        input[type="text"]:focus {
            outline: 1px solid #ff0000;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-wrapper:fullscreen {
            padding-bottom: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
        /* Style untuk YouTube Player */
        .video-wrapper iframe#player {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
        }
        /* Style untuk HTML5 Video Player (Google Drive) */
        .video-wrapper video#html5Player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 0, 0, 0.8);
            border-color: #ff0000;
        }
        .video-wrapper:hover .fullscreen-btn {
            opacity: 1;
        }
        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div class="input-section">
        <input type="text" id="youtubeUrl" placeholder="Masukkan Link YouTube atau Google Drive...">
        <button onclick="loadNewVideo()">Putar</button>
    </div>

    <div id="playerWrapper" class="video-wrapper hidden">
        <div id="player"></div>
        
        <video id="html5Player" class="hidden" autoplay loop muted playsinline controls></video>

        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Layar Penuh">
            <svg viewBox="0 0 24 24">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player;
    let currentVideoId = 'bRNlrdfKNd4'; 
    let isGoogleDrive = false;

    window.onload = async function() {
        try {
            const { data, error } = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 1)
                .maybeSingle();

            if (data && data.video_id && data.video_id !== 'contoh') {
                currentVideoId = data.video_id;
                document.getElementById('youtubeUrl').value = '';
                
                isGoogleDrive = currentVideoId.startsWith("gdrive_");
                
                if (isGoogleDrive) {
                    playGoogleDriveVideo(currentVideoId.replace("gdrive_", ""));
                } else {
                    if (typeof YT !== 'undefined' && YT.loaded) {
                        onYouTubeIframeAPIReady();
                    }
                }
            }
        } catch (err) {
            console.log("Membaca konfigurasi fallback lokal:", err);
        }
    };

    function extractMediaInfo(url) {
        if (url.includes("drive.google.com")) {
            const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            return match ? { type: 'gdrive', id: match[1] } : null;
        } else {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\?v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? { type: 'youtube', id: match[2] } : { type: 'youtube', id: url };
        }
    }

    function onYouTubeIframeAPIReady() {
        if (isGoogleDrive || !currentVideoId) return;
        
        document.getElementById('playerWrapper').classList.remove('hidden');
        document.getElementById('html5Player').classList.add('hidden');
        
        const ytDOM = document.getElementById('player');
        if (ytDOM) ytDOM.classList.remove('hidden');

        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({ videoId: currentVideoId, startSeconds: 0 });
            setTimeout(() => { player.mute(); player.playVideo(); }, 500);
        } else {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: currentVideoId,
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': currentVideoId, 'mute': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1, 'fs': 0, 'iv_load_policy': 3 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }
    }

    function onPlayerReady(event) {
        event.target.mute();
        event.target.playVideo();
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) player.playVideo();
    }

    // === REFORMASI TOTAL PLAYER GOOGLE DRIVE ===
    function playGoogleDriveVideo(fileId) {
        isGoogleDrive = true;
        document.getElementById('playerWrapper').classList.remove('hidden');
        
        // Matikan player YouTube jika sedang aktif
        const ytDOM = document.getElementById('player');
        if (ytDOM) ytDOM.classList.add('hidden');
        if (player && typeof player.stopVideo === 'function') player.stopVideo();

        // Aktifkan Player HTML5 Video khusus Drive
        const videoTag = document.getElementById('html5Player');
        videoTag.classList.remove('hidden');
        
        // Mengubah ID file menjadi link direct stream/download resmi milik Google Drive API
        videoTag.src = `https://docs.google.com/uc?export=download&id=${fileId}`;
        
        // Paksa perintah jalankan video agar kebal autoplay policy browser saat refresh halaman
        videoTag.muted = true; 
        videoTag.loop = true;
        
        // Eksekusi pemutaran secara programatik
        const playPromise = videoTag.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                console.log("Autoplay HTML5 berhasil dijalankan otomatis.");
            }).catch(error => {
                console.log("Autoplay tertahan browser, dicoba ulang...", error);
                // Metode fallback pemicu interaksi aman
                videoTag.click();
            });
        }
    }

    async function loadNewVideo() {
        const inputField = document.getElementById('youtubeUrl');
        const inputData = inputField.value.trim();
        if (!inputData) return alert('Masukkan link YouTube atau Google Drive terlebih dahulu!');

        const media = extractMediaInfo(inputData);
        
        if (media) {
            let dbValue = media.id;

            if (media.type === 'gdrive') {
                isGoogleDrive = true;
                dbValue = "gdrive_" + media.id;
                playGoogleDriveVideo(media.id);
            } else {
                isGoogleDrive = false;
                currentVideoId = media.id;
                onYouTubeIframeAPIReady();
            }

            const { error } = await supabaseClient
                .from('video_settings')
                .upsert({ id: 1, video_id: dbValue }); 

            if (error) {
                alert("Gagal sinkronisasi ke cloud Supabase: " + error.message);
            } else {
                inputField.value = '';
                inputField.placeholder = "Media berhasil disinkronkan!";
                setTimeout(() => {
                    inputField.placeholder = "Masukkan Link YouTube atau Google Drive...";
                }, 3000);
            }
        } else {
            alert('Format link tidak valid!');
        }
    }

    function toggleFullscreen() {
        const elem = document.getElementById('playerWrapper');
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }
</script>

</body>
</html>
