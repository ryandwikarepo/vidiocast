<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Loop & Mute Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .input-section {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            padding-top: 25px;
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-container iframe, .video-container div {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="input-section">
        <input type="text" id="youtubeUrl" placeholder="Masukkan Link YouTube atau Video ID...">
        <button onclick="loadNewVideo()">Putar</button>
    </div>

    <div id="playerWrapper" class="video-container hidden">
        <div id="player"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player;
    let currentVideoId = '';

    // Ambil data video terakhir dari LocalStorage saat halaman pertama kali dibuka
    window.onload = function() {
        const savedVideoId = localStorage.getItem('lastYoutubeId');
        if (savedVideoId) {
            currentVideoId = savedVideoId;
            document.getElementById('youtubeUrl').value = `https://www.youtube.com/watch?v=${savedVideoId}`;
            // Tunggu API YouTube siap sebelum memuat video lama
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }
    };

    // Fungsi ekstraksi ID dari berbagai format link YouTube
    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    // Dipanggil otomatis oleh YouTube API saat script selesai dimuat
    function onYouTubeIframeAPIReady() {
        if (!currentVideoId) return;

        document.getElementById('playerWrapper').classList.remove('hidden');

        // Jika player sudah ada, tinggal ganti videonya saja
        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({
                videoId: currentVideoId,
                startSeconds: 0
            });
            player.mute();
        } else {
            // Buat player baru
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': currentVideoId, // Diperlukan YouTube agar fitur loop bekerja pada satu video
                    'mute': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
    }

    function onPlayerReady(event) {
        event.target.mute();
        event.target.playVideo();
    }

    // Backup loop: Jika fitur 'playlist' bawaan gagal, script ini memaksa video mengulang saat habis
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            player.playVideo();
        }
    }

    // Fungsi yang berjalan saat tombol "Putar" diklik
    function loadNewVideo() {
        const inputData = document.getElementById('youtubeUrl').value.trim();
        if (!inputData) return alert('Masukkan link YouTube terlebih dahulu!');

        const videoId = extractVideoId(inputData);
        
        if (videoId.length === 11) {
            currentVideoId = videoId;
            // Simpan ke LocalStorage agar tidak hilang saat refresh
            localStorage.setItem('lastYoutubeId', videoId);
            
            // Jalankan player
            onYouTubeIframeAPIReady();
        } else {
            alert('Format link atau Video ID tidak valid!');
        }
    }
</script>

</body>
</html>
