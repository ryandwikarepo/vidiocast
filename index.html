<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Loop & Mute Player - Global Sync</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .input-section {
            margin-bottom: 20px;
            z-index: 20;
            position: relative;
        }
        :fullscreen .input-section {
            display: none !important;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            background-color: #222;
            color: #fff;
            border: 1px solid #414141;
        }
        input[type="text"]:focus {
            outline: 1px solid #ff0000;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-wrapper:fullscreen {
            padding-bottom: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: -65px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 135px);
            pointer-events: none;
        }
        .video-wrapper:fullscreen iframe {
            top: -65px;
            left: -10px;
            width: calc(100vw + 20px);
            height: calc(100vh + 135px);
        }
        .video-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 0, 0, 0.8);
            border-color: #ff0000;
        }
        .video-wrapper:hover .fullscreen-btn {
            opacity: 1;
        }
        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div class="input-section">
        <input type="text" id="youtubeUrl" placeholder="Masukkan Link YouTube atau Video ID...">
        <button onclick="loadNewVideo()">Putar</button>
    </div>

    <div id="playerWrapper" class="video-wrapper hidden">
        <div id="player"></div>
        <div class="video-mask"></div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Layar Penuh">
            <svg viewBox="0 0 24 24">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // === KONFIGURASI SUPABASE (Sesuai Dashboard Kamu) ===
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    // Ganti teks di bawah dengan Publishable Key panjang yang kamu copy dari gambar nomor 5
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player;
    let currentVideoId = 'bRNlrdfKNd4'; // Video cadangan default

    window.onload = async function() {
        try {
            // Mengambil baris data dengan ID = 1
            const { data, error } = await supabase
                .from('video_settings')
                .select('video_id')
                .eq('id', 1)
                .maybeSingle();

            // Validasi: Jika datanya ada DAN panjangnya pas 11 karakter (ID video asli)
            if (data && data.video_id && data.video_id.length === 11) {
                currentVideoId = data.video_id;
                document.getElementById('youtubeUrl').value = `https://www.youtube.com/watch?v=${currentVideoId}`;
            }
        } catch (err) {
            console.log("Membaca data lokal:", err);
        } finally {
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }
    };

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\?v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    function onYouTubeIframeAPIReady() {
        if (!currentVideoId) return;
        document.getElementById('playerWrapper').classList.remove('hidden');

        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({ videoId: currentVideoId, startSeconds: 0 });
            player.mute();
        } else {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: currentVideoId,
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': currentVideoId, 'mute': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'fs': 0, 'iv_load_policy': 3 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }
    }

    function onPlayerReady(event) { event.target.mute(); event.target.playVideo(); }
    function onPlayerStateChange(event) { if (event.data === YT.PlayerState.ENDED) { player.playVideo(); } }

    async function loadNewVideo() {
        const inputData = document.getElementById('youtubeUrl').value.trim();
        if (!inputData) return alert('Masukkan link YouTube terlebih dahulu!');

        const videoId = extractVideoId(inputData);
        
        if (videoId.length === 11) {
            currentVideoId = videoId;
            
            // Putar secara instan di layar komputer saat ini dulu
            onYouTubeIframeAPIReady();

            // Jalankan update data ke baris id 1 di Supabase secara real-time
            const { error } = await supabase
                .from('video_settings')
                .update({ video_id: videoId })
                .eq('id', 1);

            if (error) {
                alert("Sinkronisasi cloud terkendala: " + error.message);
            }
        } else {
            alert('Format link atau Video ID tidak valid!');
        }
    }

    function toggleFullscreen() {
        const elem = document.getElementById('playerWrapper');
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }
</script>

</body>
</html>
