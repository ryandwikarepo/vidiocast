<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin CLCC Display</title>
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: #fff;
            overflow-y: auto; 
        }
        
        /* === STYLE GERBANG PASSWORD === */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .auth-box {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
            max-width: 400px;
            width: 85%;
        }
        .auth-box h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            color: #fff;
        }
        .auth-box input[type="password"] {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #414141;
            background-color: #222;
            color: #fff;
            border-radius: 4px;
            font-size: 16px;
            text-align: center;
        }
        .auth-box input[type="password"]:focus {
            outline: 1px solid #ff0000;
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
        }
        .credit-input {
            font-size: 11px;
            color: #666;
            margin-top: 15px;
            display: block;
            letter-spacing: 0.5px;
        }

        /* === STYLE KONTEN UTAMA === */
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 50px; 
        }
        .player-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .player-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-section {
            margin-bottom: 20px;
            z-index: 20;
            position: relative;
            width: 100%;
        }
        .video-wrapper:fullscreen ~ .input-section,
        :fullscreen .input-section {
            display: none !important;
        }
        input[type="text"] {
            width: 65%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            background-color: #222;
            color: #fff;
            border: 1px solid #414141;
        }
        input[type="text"]:focus {
            outline: 1px solid #ff0000;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        
        /* Style Tombol Preview Layar - Merah */
        .preview-btn {
            margin-top: 15px;
            background-color: #ff0000; 
            color: #fff; 
            border: 1px solid #cc0000; 
            font-size: 14px;
            padding: 8px 16px;
            font-weight: bold; 
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .preview-btn:hover {
            background-color: #cc0000; 
            border-color: #b30000;
            color: #fff;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .video-wrapper:fullscreen {
            padding-bottom: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: -60px;
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
        }
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 0, 0, 0.8);
            border-color: #ff0000;
        }
        .video-wrapper:hover .fullscreen-btn {
            opacity: 1;
        }
        .fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .footer-credit {
            font-size: 12px;
            color: #444;
            margin-top: 20px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .hidden {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- === LAYER PROTEKSI PASSWORD === -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-box">
        <h2>Silahkan Masukan Password</h2>
        <input type="password" id="pagePassword" placeholder="Masukkan Password..." onkeydown="checkEnterKey(event)">
        <button onclick="verifyPassword()">Masuk</button>
        <span class="credit-input">dibuat oleh ryandwika</span>
    </div>
</div>

<!-- === KONTEN UTAMA === -->
<div id="mainContent" class="container hidden">
    
    <!-- === BAGIAN PEMUTAR UTAMA (PERTAMA / ATAS) === -->
    <div class="player-section">
        <div class="player-title">Pemutar Video 1</div>
        <div class="input-section">
            <input type="text" id="youtubeUrl1" placeholder="Masukkan Link YouTube atau Video ID (Player 1)...">
            <button onclick="loadNewVideo(1)">Putar</button>
        </div>
        <div id="playerWrapper1" class="video-wrapper hidden">
            <div id="player1"></div>
            <button class="fullscreen-btn" onclick="toggleFullscreen('playerWrapper1')" title="Layar Penuh">
                <svg viewBox="0 0 24 24">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>
        <!-- Tombol Preview Layar 1 -->
        <button class="preview-btn" onclick="window.open('https://clccdisplay1.vercel.app/', '_blank')">Preview Layar 1</button>
    </div>

    <!-- === BAGIAN PEMUTAR KEDUA (BAWAH) === -->
    <div class="player-section">
        <div class="player-title">Pemutar Video 2</div>
        <div class="input-section">
            <input type="text" id="youtubeUrl2" placeholder="Masukkan Link YouTube atau Video ID (Player 2)...">
            <button onclick="loadNewVideo(2)">Putar</button>
        </div>
        <div id="playerWrapper2" class="video-wrapper hidden">
            <div id="player2"></div>
            <button class="fullscreen-btn" onclick="toggleFullscreen('playerWrapper2')" title="Layar Penuh">
                <svg viewBox="0 0 24 24">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>
        <!-- Tombol Preview Layar 2 -->
        <button class="preview-btn" onclick="window.open('https://clccdisplay2.vercel.app/', '_blank')">Preview Layar 2</button>
    </div>

    <!-- Credit di Paling Bawah Halaman Utama -->
    <div class="footer-credit">dibuat oleh ryandwika</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const SUPABASE_URL = "https://zrycfquuqcygftngkwku.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_D7uzajVgAFW_8EC5hQp57g_IBiyAHYO"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let player1, player2;
    let currentVideoId1 = 'bRNlrdfKNd4'; 
    let currentVideoId2 = 'bRNlrdfKNd4'; 
    
    const SECRET_PASSWORD = "12345678";

    function verifyPassword() {
        const inputPass = document.getElementById('pagePassword').value;
        if (inputPass === SECRET_PASSWORD) {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initializeApplication();
        } else {
            alert('Password salah! Akses ditolak.');
            document.getElementById('pagePassword').value = '';
        }
    }

    function checkEnterKey(event) {
        if (event.key === "Enter") {
            verifyPassword();
        }
    }

    async function initializeApplication() {
        try {
            const res1 = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 1)
                .maybeSingle();

            if (res1.data && res1.data.video_id && res1.data.video_id !== 'contoh') {
                currentVideoId1 = res1.data.video_id;
            }

            const res2 = await supabaseClient
                .from('video_settings')
                .select('video_id')
                .eq('id', 2)
                .maybeSingle();

            if (res2.data && res2.data.video_id && res2.data.video_id !== 'contoh') {
                currentVideoId2 = res2.data.video_id;
            }

            document.getElementById('youtubeUrl1').value = '';
            document.getElementById('youtubeUrl2').value = '';

        } catch (err) {
            console.log("Membaca konfigurasi sinkronisasi cloud terhambat:", err);
        } finally {
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }

        supabaseClient
            .channel('schema-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'video_settings' },
                (payload) => {
                    if (payload.new && payload.new.id) {
                        const targetId = payload.new.id;
                        const newVideoId = payload.new.video_id;
                        
                        if (targetId === 1) {
                            currentVideoId1 = newVideoId;
                            setupSinglePlayer(1, currentVideoId1);
                        } else if (targetId === 2) {
                            currentVideoId2 = newVideoId;
                            setupSinglePlayer(2, currentVideoId2);
                        }
                    }
                }
            )
            .subscribe();
    }

    window.onload = function() {
        document.getElementById('pagePassword').focus();
    };

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\?v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    function onYouTubeIframeAPIReady() {
        setupSinglePlayer(1, currentVideoId1);
        setupSinglePlayer(2, currentVideoId2);
    }

    function setupSinglePlayer(playerNum, videoId) {
        if (!videoId) return;
        document.getElementById(`playerWrapper${playerNum}`).classList.remove('hidden');

        let targetPlayer = playerNum === 1 ? player1 : player2;

        if (targetPlayer && typeof targetPlayer.loadVideoById === 'function') {
            targetPlayer.loadVideoById({
                videoId: videoId,
                startSeconds: 0,
                suggestedQuality: 'hd1080'
            });
            setTimeout(() => {
                targetPlayer.mute();
                targetPlayer.setPlaybackQuality('hd1080');
                targetPlayer.playVideo();
            }, 500);
        } else {
            const newPlayerInstance = new YT.Player(`player${playerNum}`, {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': videoId,
                    'mute': 1,          
                    'controls': 1,      
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 0,
                    'iv_load_policy': 3,
                    'vq': 'hd1080'
                },
                events: {
                    'onReady': (event) => {
                        event.target.mute();
                        event.target.setPlaybackQuality('hd1080');
                        event.target.playVideo();
                        setTimeout(() => {
                            if (event.target.getPlayerState() !== 1) event.target.playVideo();
                        }, 1000);
                    },
                    'onStateChange': (event) => {
                        if (event.data === YT.PlayerState.PLAYING) {
                            event.target.setPlaybackQuality('hd1080');
                        }
                        if (event.data === YT.PlayerState.ENDED) {
                            event.target.playVideo();
                        }
                    }
                }
            });

            if (playerNum === 1) player1 = newPlayerInstance;
            else player2 = newPlayerInstance;
        }
    }

    async function loadNewVideo(playerNum) {
        const inputField = document.getElementById(`youtubeUrl${playerNum}`);
        const inputData = inputField.value.trim();
        if (!inputData) return alert(`Masukkan link YouTube terlebih dahulu untuk Pemutar ${playerNum}!`);

        const videoId = extractVideoId(inputData);
        
        if (videoId.length === 11) {
            if (playerNum === 1) currentVideoId1 = videoId;
            else currentVideoId2 = videoId;
            
            setupSinglePlayer(playerNum, videoId);

            const { error } = await supabaseClient
                .from('video_settings')
                .upsert({ id: playerNum, video_id: videoId }); 

            if (error) {
                alert("Gagal sinkronisasi data ke cloud Supabase: " + error.message);
            } else {
                inputField.value = '';
                inputField.placeholder = `Video ${playerNum} disinkronkan!`;
                
                setTimeout(() => {
                    inputField.placeholder = `Masukkan Link YouTube atau Video ID (Player ${playerNum})...`;
                }, 3000);
            }
        } else {
            alert('Format link atau Video ID tidak valid!');
        }
    }

    function toggleFullscreen(wrapperId) {
        const elem = document.getElementById(wrapperId);
        if (!document.fullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }
</script>

</body>
</html>
