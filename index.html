<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Loop & Mute Player - Pure Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .input-section {
            margin-bottom: 20px;
            z-index: 20; /* Memastikan input tetap berada di paling atas dan bisa diklik */
            position: relative;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            background-color: #222;
            color: #fff;
            border: 1px solid #414141;
        }
        input[type="text"]:focus {
            outline: 1px solid #ff0000;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #cc0000;
        }
        
        /* Bingkai Utama Player */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Rasio 16:9 */
            background: #000;
            border-radius: 8px;
            overflow: hidden; /* Memotong semua elemen YouTube yang keluar dari bingkai */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        /* Trik Zoom & Geser untuk Menyembunyikan Judul dan Kontrol YouTube secara Absolut */
        .video-wrapper iframe {
            position: absolute;
            top: -65px; /* Mendorong judul YouTube ke atas hingga tidak terlihat */
            left: -10px;
            width: calc(100% + 20px); /* Melebarkan sedikit agar pas */
            height: calc(100% + 135px); /* Menambah tinggi agar bar kontrol di bawah terdorong ke luar bingkai */
        }

        /* Lapisan Pelindung Transparan Total */
        .video-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            cursor: default;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="input-section">
        <input type="text" id="youtubeUrl" placeholder="Masukkan Link YouTube atau Video ID...">
        <button onclick="loadNewVideo()">Putar</button>
    </div>

    <div id="playerWrapper" class="video-wrapper hidden">
        <div id="player"></div>
        <div class="video-mask"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player;
    let currentVideoId = '';

    window.onload = function() {
        const savedVideoId = localStorage.getItem('lastYoutubeId');
        if (savedVideoId) {
            currentVideoId = savedVideoId;
            document.getElementById('youtubeUrl').value = `https://www.youtube.com/watch?v=${savedVideoId}`;
            if (typeof YT !== 'undefined' && YT.loaded) {
                onYouTubeIframeAPIReady();
            }
        }
    };

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    function onYouTubeIframeAPIReady() {
        if (!currentVideoId) return;

        document.getElementById('playerWrapper').classList.remove('hidden');

        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({
                videoId: currentVideoId,
                startSeconds: 0
            });
            player.mute();
        } else {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: currentVideoId,
                playerVars: {
                    'autoplay': 1,
                    'loop': 1,
                    'playlist': currentVideoId,
                    'mute': 1,
                    'controls': 0, /* Mematikan kontrol dasar YouTube */
                    'rel': 0,
                    'modestbranding': 1,
                    'fs': 0, /* Mematikan tombol fullscreen bawaan */
                    'iv_load_policy': 3 /* Menyembunyikan anotasi video */
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
    }

    function onPlayerReady(event) {
        event.target.mute();
        event.target.playVideo();
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            player.playVideo();
        }
    }

    function loadNewVideo() {
        const inputData = document.getElementById('youtubeUrl').value.trim();
        if (!inputData) return alert('Masukkan link YouTube terlebih dahulu!');

        const videoId = extractVideoId(inputData);
        
        if (videoId.length === 11) {
            currentVideoId = videoId;
            localStorage.setItem('lastYoutubeId', videoId);
            onYouTubeIframeAPIReady();
        } else {
            alert('Format link atau Video ID tidak valid!');
        }
    }
</script>

</body>
</html>
